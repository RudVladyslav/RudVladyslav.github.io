<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
<div class="main-wrapper">
    <h1>Калькулятор личных доходов</h1>
    <div class="inputs-block">
        <div class="inputs-block-column">
            <h6>Доход в месяц</h6>
            <div class="inputs-wrapper">
                <input type="number"
                       placeholder="Зарплата"
                       id="income-salary"
                       class="input"
                >
                <input
                        type="number"
                        placeholder="Фриланс"
                        id="income-freelance"
                        class="input"
                >
                <input
                        type="number"
                        placeholder="Доп. доход "
                        id="income-extra-1"
                        class="input"
                >
                <input
                        type="number"
                        placeholder="Доп. доход "
                        id="income-extra-2"
                        class="input"
                >
            </div>
        </div>
        <div class="inputs-block-column">
            <h6>Обязательные расходы</h6>
            <div class="inputs-wrapper">
                <input type="number"
                       placeholder="Аренда квартиры"
                       id="costs-flat"
                       class="input"
                >
                <input
                        type="number"
                        placeholder="ЖКХ"
                        id="costs-house-service"
                        class="input"
                >
                <input
                        type="number"
                        placeholder="Транспорт"
                        id="cost-transport"
                        class="input"
                >
                <input
                        type="number"
                        placeholder="Кредиты"
                        id="cost-credit"
                        class="input"
                >

            </div>
        </div>
        <div class="inputs-block-column">
            <div class="total-numb">
            <h6>Доступно в месяц (без копилки)</h6>
                <input
                        type="number"
                        id="total-month"
                        class="total"
                        value="0"
                        readonly
                >
            </div>
            <div class="total-numb">
                <h6>Доступно в день</h6>
                <input
                        type="number"
                        id="total-day"
                        class="total"
                        value="0"
                        readonly
                >
            </div>
            <div class="total-numb">
                <h6>Накопим за год</h6>
                <input
                        type="number"
                        id="total-year"
                        class="total"
                        value="0"
                        readonly
                >
            </div>
        </div>
    </div>
    <div class="range-block">
        <h6>Копилка</h6>
        <div class="range-wrapper">
            <input type="range" min="0" max="100" value="0" id="money-box-range">
        </div>
        <div><span id="total-precents">0</span>%</div>
    </div>
    <div class="result-block">
        <div class="total-numb">
            <h6>Копим</h6>
            <input
                    type="number"
                    id="accumulation"
                    value="0"
                    readonly
            >
        </div>
        <div class="total-numb">
            <h6>Тратим</h6>
            <input
                    type="number"
                    id="spend"
                    value="0"
                    readonly
            >
        </div>
    </div>
</div>
<script src="app.js"></script>
</body>
</html>
