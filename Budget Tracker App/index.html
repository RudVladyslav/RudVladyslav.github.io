<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Budget Tracker App </title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/calendar.css">
</head>

<body>
    <!-- section-header -->
    <section class="section-outer section-header">
        <div class="section-inner">
            <div class="header-wrap">

                <h1>Budget Tracker App</h1>
                <h2 class="header-name__person">ElifTech</h2>
            </div>
        </div>
    </section>
    <!-- /section-header -->

    <!-- section-content -->
    <section class="section-outer section-content">
        <div class="section-inner">
            <div class="content-wrapper">
                <div class="calendar">
                    <input class="date" type="date" value="2021-04-23">
                </div>
                <div class="inputs">
                    <input type="number" class="input__value" placeholder="Spent Amount($)" value="23">
                    <input type="text" class="input__category" placeholder="Category" value="food">
                    <button class="send-information"><p>Creat Entery </p></button>
                </div>
            </div>
        </div>
    </section>
    <!-- /section-header -->

    <!-- section-spend -->
    <section class="section-outer section-day__spending">
        <div class="section-inner">
            <div class="total">
                <h3>Total:</h3>
                <h3 class="total-value"></h3>
            </div>
            <div class="wrap-day">
                <h3>Day spendings:</h3>
                <h3 class="currentDate"></h3>
            </div>
            <div class="day__spending-wrapper">

                <div class="day__spending-wrapper__item">
                    <div class="day__spending-wrapper__item__text">

                    </div>
                    <div class="day__spending-wrapper__item__buttons">

                    </div>
                </div>

            </div>
        </div>
    </section>
    <!-- /section-spend -->
    <script src="./main.js"></script>
</body>


</html>
