<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Game</title>
</head>
<body>
<h1 class="game-title">TikTaсToe</h1>
<div class="game-wrapper">
    <h4 class="onPcMoves"></h4>
    <div class="area">
        <div class="box" data-arr="0"></div>
        <div class="box" data-arr="1"></div>
        <div class="box" data-arr="2"></div>
        <div class="box" data-arr="3"></div>
        <div class="box" data-arr="4"></div>
        <div class="box" data-arr="5"></div>
        <div class="box" data-arr="6"></div>
        <div class="box" data-arr="7"></div>
        <div class="box" data-arr="8"></div>
    </div>

    <div class="statistics-wrapper">
        <h2 class="isPlayer"></h2>
        <h3 class="error"></h3>
        <h2 class="winner"></h2>
        <button class="newGame">New game</button>
    </div>

</div>


<script src="objIndex.js"></script>
</body>
</html>
